<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Quran Al-Kareem - The Noble Quran</title>
    <style>
        /* ============ CSS CUSTOM PROPERTIES ============ */
        :root {
            --deep-navy: #0a1128;
            --royal-blue: #14264b;
            --ink-blue: #1a2f55;
            --gold: #c9a44b;
            --gold-light: #e0c87d;
            --parchment: #faf6ee;
            --ivory: #fdf9f0;
            --cream: #f5ecd7;
            --turquoise-accent: #2d8f8f;
            --text-dark: #2c2416;
            --text-muted: #6b5e4a;
            --border-gold: #b8943f;
            --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.3);
            --shadow-card: 0 2px 12px rgba(0, 0, 0, 0.15);
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --transition: 0.25s ease;
        }

        /* ============ GLOBAL RESET & BASE ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(160deg, #060d20 0%, var(--deep-navy) 30%, #0d1832 60%, #0a1028 100%);
            background-attachment: fixed;
            color: var(--text-dark);
            min-height: 100vh;
            line-height: 1.7;
        }

        /* Subtle geometric pattern overlay */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(201, 164, 75, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(45, 143, 143, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(201, 164, 75, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============ LAYOUT ============ */
        .app-container {
            display: flex;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* ============ SIDEBAR ============ */
        .sidebar {
            width: 340px;
            min-width: 340px;
            background: linear-gradient(180deg, #0d1a35 0%, #111f3d 50%, #0c162e 100%);
            border-right: 1px solid rgba(201, 164, 75, 0.25);
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: sticky;
            top: 0;
            box-shadow: 4px 0 25px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        .sidebar-header {
            padding: 28px 24px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(201, 164, 75, 0.2);
            background: linear-gradient(180deg, rgba(201, 164, 75, 0.08) 0%, transparent 100%);
        }

        .sidebar-header .bismillah {
            font-family: 'Traditional Arabic', 'Amiri', 'Georgia', serif;
            font-size: 1.8rem;
            color: var(--gold);
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .sidebar-header h1 {
            font-size: 1.3rem;
            color: var(--gold-light);
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .sidebar-header .subtitle {
            font-size: 0.7rem;
            color: var(--text-muted);
            letter-spacing: 2px;
            margin-top: 4px;
            color: rgba(224, 200, 125, 0.6);
        }

        /* Search */
        .search-wrapper {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(201, 164, 75, 0.12);
        }

        .search-wrapper input {
            width: 100%;
            padding: 11px 16px;
            border-radius: 25px;
            border: 1px solid rgba(201, 164, 75, 0.3);
            background: rgba(255, 255, 255, 0.05);
            color: var(--parchment);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition);
        }

        .search-wrapper input::placeholder {
            color: rgba(250, 246, 238, 0.4);
        }
        .search-wrapper input:focus {
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(201, 164, 75, 0.1);
        }

        /* Chapter list */
        .chapter-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .chapter-list::-webkit-scrollbar {
            width: 5px;
        }
        .chapter-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .chapter-list::-webkit-scrollbar-thumb {
            background: rgba(201, 164, 75, 0.3);
            border-radius: 10px;
        }

        .chapter-item {
            display: flex;
            align-items: center;
            padding: 13px 20px;
            cursor: pointer;
            transition: var(--transition);
            border-left: 3px solid transparent;
            gap: 14px;
            color: #c5bfad;
            position: relative;
        }

        .chapter-item:hover {
            background: rgba(201, 164, 75, 0.08);
            color: var(--parchment);
        }

        .chapter-item.active {
            background: linear-gradient(90deg, rgba(201, 164, 75, 0.15) 0%, rgba(201, 164, 75, 0.03) 100%);
            border-left: 3px solid var(--gold);
            color: var(--gold-light);
        }

        .chapter-number {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: rgba(201, 164, 75, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            color: var(--gold);
            flex-shrink: 0;
            border: 1px solid rgba(201, 164, 75, 0.25);
        }

        .chapter-item.active .chapter-number {
            background: var(--gold);
            color: #0d1a35;
            border-color: var(--gold);
        }

        .chapter-info {
            flex: 1;
            min-width: 0;
        }

        .chapter-name-ar {
            font-family: 'Traditional Arabic', 'Amiri', 'Georgia', serif;
            font-size: 1.2rem;
            line-height: 1.2;
        }

        .chapter-name-en {
            font-size: 0.75rem;
            opacity: 0.7;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chapter-verses {
            font-size: 0.7rem;
            color: var(--turquoise-accent);
            flex-shrink: 0;
        }

        /* ============ MAIN CONTENT ============ */
        .main-content {
            flex: 1;
            padding: 30px 40px;
            max-height: 100vh;
            overflow-y: auto;
        }

        .main-content::-webkit-scrollbar {
            width: 6px;
        }
        .main-content::-webkit-scrollbar-track {
            background: transparent;
        }
        .main-content::-webkit-scrollbar-thumb {
            background: rgba(201, 164, 75, 0.25);
            border-radius: 10px;
        }

        /* Chapter header card */
        .chapter-header {
            background: linear-gradient(135deg, #112048 0%, #1a2f55 50%, #14264b 100%);
            border-radius: var(--radius-lg);
            padding: 35px 40px;
            margin-bottom: 30px;
            text-align: center;
            border: 1px solid rgba(201, 164, 75, 0.3);
            box-shadow: var(--shadow-soft);
            position: relative;
            overflow: hidden;
        }

        .chapter-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at center, rgba(201, 164, 75, 0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .chapter-header .ch-number-display {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--gold);
            line-height: 1;
            position: relative;
            z-index: 1;
        }

        .chapter-header .ch-name-ar-display {
            font-family: 'Traditional Arabic', 'Amiri', 'Georgia', serif;
            font-size: 2.8rem;
            color: var(--gold-light);
            margin: 8px 0;
            position: relative;
            z-index: 1;
        }

        .chapter-header .ch-name-en-display {
            font-size: 1.1rem;
            color: rgba(224, 200, 125, 0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            z-index: 1;
        }

        .chapter-header .ch-info-row {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 18px;
            position: relative;
            z-index: 1;
        }

        .ch-info-badge {
            background: rgba(201, 164, 75, 0.1);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            color: var(--gold-light);
            border: 1px solid rgba(201, 164, 75, 0.2);
        }

        /* Verse cards */
        .verses-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .verse-card {
            background: var(--ivory);
            border-radius: var(--radius-md);
            padding: 22px 28px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(184, 148, 63, 0.2);
            transition: var(--transition);
            display: flex;
            gap: 18px;
            align-items: flex-start;
        }

        .verse-card:hover {
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
            border-color: rgba(184, 148, 63, 0.45);
            transform: translateY(-1px);
        }

        .verse-number {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #c9a44b 0%, #a07828 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8rem;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(201, 164, 75, 0.3);
        }

        .verse-text-ar {
            font-family: 'Traditional Arabic', 'Amiri', 'Georgia', 'Times New Roman', serif;
            font-size: 1.6rem;
            line-height: 2.3;
            color: #1a1a1a;
            text-align: right;
            direction: rtl;
            flex: 1;
        }

        .verse-text-en {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-top: 8px;
            line-height: 1.6;
            text-align: left;
            direction: ltr;
            font-style: italic;
        }

        .verse-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: rgba(250, 246, 238, 0.5);
        }

        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.1rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .app-container {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                min-width: 100%;
                height: auto;
                max-height: 45vh;
                position: relative;
                flex-shrink: 0;
            }
            .main-content {
                padding: 20px 16px;
            }
            .chapter-header {
                padding: 24px 20px;
            }
            .chapter-header .ch-number-display {
                font-size: 2.5rem;
            }
            .chapter-header .ch-name-ar-display {
                font-size: 2rem;
            }
            .verse-card {
                flex-direction: column;
                padding: 18px;
            }
            .verse-text-ar {
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- ============ SIDEBAR ============ -->
        <aside class="sidebar">
            <div class="sidebar-header">

        <main class="main-content" id="mainContent">
            <div class="empty-state">

                <p>Select a chapter from the sidebar<br>to begin reading the Holy Quran</p>
            </div>
        </main>
    </div>
